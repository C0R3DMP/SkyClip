version: '3.8'

# 🌐 H2 Database Development Setup
# For developers who want a simple H2 file-based database without PostgreSQL
# Usage: docker-compose -f docker-compose-h2.yml up

services:
  clipcascade:
    image: sathvikrao/clipcascade:0.7.0
    container_name: clipcascade-h2
    ports:
      - 8080:8080
    restart: always

    volumes:
      - ./cc_users:/database
      # - ./logs:/logs

    environment:
      - CC_MAX_MESSAGE_SIZE_IN_MiB=1

      # Database Configuration (H2 File Mode)
      - CC_SERVER_DB_URL=jdbc:h2:file:./database/clipcascade;CIPHER=AES;MODE=PostgreSQL
      - CC_SERVER_DB_DRIVER=org.h2.Driver
      - CC_SERVER_DB_USERNAME=clipcascade

      # ⚠️  DEV ONLY — Do not use in production
      # This is the default H2 encryption password for development
      - CC_SERVER_DB_PASSWORD=QjuGlhE3uwylBBANMkX1 o2MdEoFgbU5XkFvTftky

      - CC_SERVER_DB_HIBERNATE_DIALECT=org.hibernate.dialect.H2Dialect
      - SPRING_PROFILES_ACTIVE=h2

      # Additional settings
      - CC_PORT=8080
