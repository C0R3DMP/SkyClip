# =====================================================
# PostgreSQL Database Configuration (application-postgres.properties)
# =====================================================
# This file is loaded when spring.profiles.active=postgres

# Database Connection
spring.datasource.url=${CC_SERVER_DB_URL}
spring.datasource.driverClassName=${CC_SERVER_DB_DRIVER}
spring.datasource.username=${CC_SERVER_DB_USERNAME}
spring.datasource.password=${CC_SERVER_DB_PASSWORD}

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=${CC_SERVER_DB_HIBERNATE_DIALECT}
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false
